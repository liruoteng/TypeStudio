name: Release

on:
  push:
    tags:
      - 'v*'

env:
  TINYMIST_VERSION: v0.14.16

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            tinymist_archive: tinymist-aarch64-apple-darwin.tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            tinymist_archive: tinymist-x86_64-apple-darwin.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            tinymist_archive: tinymist-x86_64-pc-windows-msvc.zip
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            tinymist_archive: tinymist-x86_64-unknown-linux-gnu.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Download tinymist (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          URL="https://github.com/Myriad-Dreamin/tinymist/releases/download/${{ env.TINYMIST_VERSION }}/${{ matrix.tinymist_archive }}"
          curl -L "$URL" | tar -xz -C src-tauri/binaries/ tinymist
          mv src-tauri/binaries/tinymist "src-tauri/binaries/tinymist-${{ matrix.target }}"
          chmod +x "src-tauri/binaries/tinymist-${{ matrix.target }}"

      - name: Download tinymist (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $url = "https://github.com/Myriad-Dreamin/tinymist/releases/download/${{ env.TINYMIST_VERSION }}/${{ matrix.tinymist_archive }}"
          Invoke-WebRequest -Uri $url -OutFile tinymist.zip
          Expand-Archive -Path tinymist.zip -DestinationPath tinymist-tmp
          Move-Item tinymist-tmp/tinymist.exe "src-tauri/binaries/tinymist-${{ matrix.target }}.exe"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS signing (optional — remove if you don't have a cert)
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Type Studio ${{ github.ref_name }}'
          releaseBody: 'See CHANGELOG for details.'
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
